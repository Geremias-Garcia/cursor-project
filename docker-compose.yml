services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/backend/public:ro
    depends_on:
      - app
      - frontend
    networks:
      - auction-net

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_HOST: postgres
      DB_DATABASE: auction
      DB_USERNAME: auction
      DB_PASSWORD: secret
      REDIS_HOST: redis
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SANCTUM_STATEFUL_DOMAINS: localhost:5173,localhost:8080,127.0.0.1:5173,127.0.0.1:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - auction-net
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(0);'"]
      interval: 30s
      timeout: 5s
      retries: 3

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: php artisan queue:work --sleep=1 --tries=3
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: local
      DB_HOST: postgres
      DB_DATABASE: auction
      DB_USERNAME: auction
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - app
      - redis
    networks:
      - auction-net

  reverb:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8081:8080"
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: local
      REDIS_HOST: redis
      REVERB_APP_ID: auction
      REVERB_APP_KEY: local-key
      REVERB_APP_SECRET: local-secret
    depends_on:
      - app
      - redis
    networks:
      - auction-net

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: auction
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction -d auction"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auction-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - auction-net

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      # Vite proxy target inside Docker network (browser still uses localhost:5173)
      VITE_PROXY_TARGET: http://nginx:80
    networks:
      - auction-net

networks:
  auction-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
